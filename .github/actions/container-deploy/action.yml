name: Container Deployment

description: Build and deploy container image

inputs:
  environment:
    description: "Environment, either 'production' or 'preview' (this will determine which image is pushed and where it redeploys)"
    required: true
    default: "preview"
  app:
    description: "App name, either 'continuum' or 'www' or whatever app you're running"
    required: true
  X_API_KEY_CI:
    description: "Notify token"
    required: true
  CONTAINER_SERVICE_TOKEN:
    description: "API token"
    required: true
  GITHUB_TOKEN:
    description: "GitHub token with packages:write for GHCR and PR comments"
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to GHCR
      shell: bash
      run: |
        echo "${{ inputs.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Build image with script
      id: build
      shell: bash
      run: |
        set -euo pipefail
        START_TS=$(date +%s)
        echo "start_ts=$START_TS" >> "$GITHUB_OUTPUT"

        IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:${{ inputs.environment }}"
        ./deployment/${{ inputs.app }}/build \
          --env "${{ inputs.environment }}" \
          --service "${{ inputs.app }}" \
          --image "$IMAGE"

    - name: Push image (production + latest)
      if: ${{ inputs.environment == 'production' }}
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:production"
        LATEST="ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:latest"
        docker push "$IMAGE"
        docker tag "$IMAGE" "$LATEST"
        docker push "$LATEST"

    - name: Push image (preview)
      if: ${{ inputs.deployment_environment == 'preview' }}
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}:preview"
        docker push "$IMAGE"

    - name: Install Koyeb CLI and redeploy
      shell: bash
      run: |
        # Write Koyeb CLI config
        cat > "$HOME/.koyeb.yaml" << EOF
        debug: false
        organization: ""
        token: ${{ inputs.CONTAINER_SERVICE_TOKEN }}
        url: https://app.koyeb.com
        EOF

        # Install CLI
        curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
        export PATH="$HOME/.koyeb/bin:$PATH"

        # Choose target
        if [[ "${{ inputs.environment }}" == "production" ]]; then
          echo "Deploying to production environment"
          DEPLOY_TARGET="${{ inputs.app }}/${{ inputs.app }}" # no need to append environment for prod since it's the default
        elif [[ "${{ inputs.environment }}" == "preview" ]]; then
          echo "Deploying to preview environment"
          DEPLOY_TARGET="${{ inputs.app }}-preview/${{ inputs.app }}-preview"
        else
          echo "Unknown environment: ${{ inputs.environment }}"
          exit 1
        fi

        # Redeploy
        koyeb service redeploy "$DEPLOY_TARGET"

    ########## NOTFY ###########
    - name: Capture end timestamp
      id: end
      shell: bash
      run: |
        END_TS=$(date +%s)
        echo "end_ts=$END_TS" >> "$GITHUB_OUTPUT"

    - name: Compute duration
      id: duration
      shell: bash
      run: |
        echo "seconds=$(( ${{ steps.end.outputs.end_ts }} - ${{ steps.build.outputs.start_ts }} ))" >> "$GITHUB_OUTPUT"

    - name: Notify about preview deployment (PR only)
      if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
      env:
        DEPLOYED_APP: ${{ inputs.app }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.GITHUB_TOKEN }}
        script: |
          const app = process.env.DEPLOYED_APP;
          const body = [
            `## ${app} Preview Deployment Ready`,
            ``,
            `**App:** \`${app}\``,
            ``,
            `**Preview URL:** [${app}-preview.rccyx.me](https://${app}-preview.rccyx.me)`,
            ``,
            `---`,
            `This preview reflects the changes in this PR. It auto-deploys when the deployment label is applied.`
          ].join("\n");
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });

    - name: Notify • Deploy OK
      if: success()
      uses: rccyx/notify@main
      with:
        token: ${{ inputs.X_API_KEY_CI }}
        title: "Deployment Succeeded"
        message: |
          ### Details
          - **App:** ${{ inputs.app }}
          - **Environment:** `${{ inputs.environment }}`
          - **Actor:** @${{ github.actor }}
          - **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **Run:** [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Duration:** ${{ steps.duration.outputs.seconds }} seconds

          ---
          The application is now live.

    - name: Notify • Deploy Fail
      if: failure()
      uses: rccyx/notify@main
      with:
        token: ${{ inputs.X_API_KEY_CI }}
        title: "Deployment Failed"
        message: |
          ### Details

          - **App:** ${{ inputs.app }}
          - **Environment:** ${{ inputs.environment }}
          - **Actor:** @${{ github.actor }}
          - **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **Run:** [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Duration:** ${{ steps.duration.outputs.seconds }} seconds

          ---
          Redeploy attempt failed. Check workflow logs for details.
